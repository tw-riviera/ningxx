<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穿過空氣 · Passing Through Air</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08080a;
            overflow: hidden;
            font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
            cursor: crosshair;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            z-index: 10;
        }

        .top-left {
            font-size: 11px;
            color: #3a3530;
            letter-spacing: 2px;
            line-height: 1.8;
        }

        .top-left .active {
            color: #8a7f70;
        }

        .center-whisper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: opacity 3s ease;
        }

        .center-whisper.show {
            opacity: 0.4;
        }

        .center-whisper p {
            font-family: 'Noto Serif TC', serif;
            font-size: 14px;
            color: #c4b8a8;
            letter-spacing: 4px;
            font-weight: 300;
        }

        .bottom-right {
            text-align: right;
            font-size: 10px;
            color: #2a2520;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .trace-log {
            position: fixed;
            bottom: 40px;
            left: 40px;
            font-size: 10px;
            color: #4a453e;
            letter-spacing: 0.5px;
            line-height: 1.8;
            max-width: 300px;
            pointer-events: none;
        }

        .trace-line {
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="top-left">
            <span class="active">PROTOCOL: DRIFT</span><br>
            NODE: HK-HERMES-GATEWAY<br>
            STATUS: TRANSMITTING<br>
            ENCRYPTION: NONE_REQUIRED<br>
            <span id="coords">X: 0000 Y: 0000</span>
        </div>

        <div class="center-whisper" id="whisper">
            <p>移動你的手指<br>數據會跟隨</p>
        </div>

        <div class="trace-log" id="traceLog"></div>

        <div class="bottom-right">
            Packets: <span id="packetCount">0</span><br>
            Latency: <span id="latency">0</span>ms<br>
            Hops: <span id="hops">0</span><br>
            Trace: <span id="traceStatus">ACTIVE</span>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 粒子系統
        const particles = [];
        const trails = [];
        let mouseX = width / 2;
        let mouseY = height / 2;
        let isMoving = false;
        let packetCount = 0;
        let hopCount = 0;

        class Particle {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.targetX = targetX;
                this.targetY = targetY;
                this.vx = (targetX - x) * 0.02 + (Math.random() - 0.5) * 2;
                this.vy = (targetY - y) * 0.02 + (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = 0.5 + Math.random() * 1.5;
                this.hue = 30 + Math.random() * 30; // 暖金色調
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 40%, 70%, ${this.life * 0.6})`;
                ctx.fill();
            }
        }

        class Trail {
            constructor(x, y) {
                this.points = [{x, y, life: 1}];
                this.maxLength = 40;
            }

            addPoint(x, y) {
                this.points.push({x, y, life: 1});
                if (this.points.length > this.maxLength) {
                    this.points.shift();
                }
            }

            update() {
                for (let p of this.points) {
                    p.life -= 0.015;
                }
                this.points = this.points.filter(p => p.life > 0);
            }

            draw() {
                if (this.points.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    const p = this.points[i];
                    const prev = this.points[i-1];
                    const mx = (prev.x + p.x) / 2;
                    const my = (prev.y + p.y) / 2;
                    ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
                }
                const last = this.points[this.points.length - 1];
                ctx.lineTo(last.x, last.y);
                
                ctx.strokeStyle = `hsla(35, 30%, 60%, ${this.points[0].life * 0.15})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        // 網絡節點
        const nodes = [];
        const nodeCount = 12;
        for (let i = 0; i < nodeCount; i++) {
            nodes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: 2 + Math.random() * 2,
                pulse: Math.random() * Math.PI * 2
            });
        }

        let mainTrail = new Trail(mouseX, mouseY);
        let lastMouseX = mouseX;
        let lastMouseY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            isMoving = true;
            
            const dx = mouseX - lastMouseX;
            const dy = mouseY - lastMouseY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > 3) {
                mainTrail.addPoint(mouseX, mouseY);
                
                // 生成粒子
                for (let i = 0; i < 3; i++) {
                    particles.push(new Particle(
                        mouseX, 
                        mouseY,
                        mouseX + dx * 2 + (Math.random() - 0.5) * 50,
                        mouseY + dy * 2 + (Math.random() - 0.5) * 50
                    ));
                }
                
                packetCount += 3;
                document.getElementById('packetCount').textContent = packetCount;
                document.getElementById('latency').textContent = Math.floor(Math.random() * 15 + 5);
                
                if (Math.random() > 0.7) {
                    hopCount++;
                    document.getElementById('hops').textContent = hopCount;
                    addTraceLog();
                }
                
                lastMouseX = mouseX;
                lastMouseY = mouseY;
            }
            
            document.getElementById('coords').textContent = 
                `X: ${String(Math.floor(mouseX)).padStart(4, '0')} Y: ${String(Math.floor(mouseY)).padStart(4, '0')}`;
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            isMoving = true;
            
            mainTrail.addPoint(mouseX, mouseY);
            for (let i = 0; i < 2; i++) {
                particles.push(new Particle(mouseX, mouseY, mouseX + (Math.random()-0.5)*60, mouseY + (Math.random()-0.5)*60));
            }
            packetCount += 2;
            document.getElementById('packetCount').textContent = packetCount;
        }, {passive: false});

        function addTraceLog() {
            const logs = [
                `> hop ${hopCount}: 172.16.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`,
                `> ttl=${64-hopCount} proto=TCP flags=S`,
                `> seq=${Math.floor(Math.random()*99999)} ack=0 win=64240`,
                `> packet fragmented, reassembling...`,
                `> SYN-ACK received, RTT ${Math.floor(Math.random()*20+2)}ms`,
                `> TLS handshake: ClientHello sent`,
                `> cipher suite: TLS_AES_256_GCM_SHA384`,
                `> connection established, tunnel open`
            ];
            const log = logs[Math.floor(Math.random() * logs.length)];
            const logEl = document.getElementById('traceLog');
            const line = document.createElement('div');
            line.className = 'trace-line';
            line.textContent = log;
            logEl.appendChild(line);
            if (logEl.children.length > 6) {
                logEl.removeChild(logEl.firstChild);
            }
        }

        // 顯示提示
        setTimeout(() => {
            document.getElementById('whisper').classList.add('show');
        }, 800);

        // 主循環
        function animate() {
            ctx.fillStyle = 'rgba(8, 8, 10, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 繪製節點之間的連線
            ctx.strokeStyle = 'rgba(60, 55, 48, 0.08)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 200) {
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }
            
            // 更新和繪製節點
            for (let node of nodes) {
                node.x += node.vx;
                node.y += node.vy;
                node.pulse += 0.02;
                
                if (node.x < 0 || node.x > width) node.vx *= -1;
                if (node.y < 0 || node.y > height) node.vy *= -1;
                
                const pulseSize = node.size + Math.sin(node.pulse) * 0.5;
                ctx.beginPath();
                ctx.arc(node.x, node.y, pulseSize, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(100, 90, 78, 0.3)';
                ctx.fill();
            }
            
            // 更新軌跡
            mainTrail.update();
            mainTrail.draw();
            
            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // 隨機生成背景粒子
            if (Math.random() > 0.9) {
                particles.push(new Particle(
                    Math.random() * width,
                    Math.random() * height,
                    Math.random() * width,
                    Math.random() * height
                ));
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
