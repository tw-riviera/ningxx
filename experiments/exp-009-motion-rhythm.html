<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXP-009 · Motion</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #fff;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.motion-stage {
  position: relative;
  width: 80vw;
  height: 80vh;
}
.motion-element {
  position: absolute;
  width: 4px;
  background: #fff;
  opacity: 0.6;
}
.motion-element:nth-child(1) {
  left: 10%;
  height: 20%;
  top: 40%;
  animation: sway 3s ease-in-out infinite;
}
.motion-element:nth-child(2) {
  left: 20%;
  height: 40%;
  top: 30%;
  animation: sway 3.5s ease-in-out infinite 0.2s;
  opacity: 0.4;
}
.motion-element:nth-child(3) {
  left: 30%;
  height: 60%;
  top: 20%;
  animation: sway 4s ease-in-out infinite 0.4s;
  opacity: 0.3;
}
.motion-element:nth-child(4) {
  left: 40%;
  height: 30%;
  top: 35%;
  animation: sway 2.8s ease-in-out infinite 0.6s;
  opacity: 0.5;
}
.motion-element:nth-child(5) {
  left: 50%;
  height: 50%;
  top: 25%;
  animation: sway 3.2s ease-in-out infinite 0.8s;
  opacity: 0.35;
}
.motion-element:nth-child(6) {
  left: 60%;
  height: 25%;
  top: 37%;
  animation: sway 3.8s ease-in-out infinite 1s;
  opacity: 0.45;
}
.motion-element:nth-child(7) {
  left: 70%;
  height: 45%;
  top: 27%;
  animation: sway 2.5s ease-in-out infinite 1.2s;
  opacity: 0.5;
}
.motion-element:nth-child(8) {
  left: 80%;
  height: 35%;
  top: 32%;
  animation: sway 4.2s ease-in-out infinite 1.4s;
  opacity: 0.3;
}
@keyframes sway {
  0%, 100% { transform: translateY(0) scaleY(1); }
  50% { transform: translateY(-30px) scaleY(1.1); }
}
.motion-text {
  position: absolute;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.4;
  text-align: center;
}
</style>
</head>
<body>

<div class="motion-stage">
