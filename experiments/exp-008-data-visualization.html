<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXP-008 · Data</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f5f0;
  color: #1a1a1a;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh;
  padding: 80px 40px;
}
.data-container {
  max-width: 900px;
  margin: 0 auto;
}
.data-row {
  display: flex;
  align-items: center;
  padding: 20px 0;
  border-bottom: 1px solid #ddd;
  gap: 40px;
}
.data-label {
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #999;
  min-width: 120px;
  font-family: monospace;
}
.data-bar {
  flex: 1;
  height: 2px;
  background: #ddd;
  position: relative;
}
.data-bar-fill {
  height: 100%;
  background: #1a1a1a;
  transition: width 1s ease;
}
.data-value {
  font-size: 12px;
  color: #666;
  min-width: 60px;
  text-align: right;
  font-family: monospace;
}
.title {
  font-size: 32px;
  font-weight: 300;
  margin-bottom: 60px;
  letter-spacing: -0.02em;
}
.meta {
  margin-top: 80px;
  font-size: 10px;
  color: #999;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div class="data-container">
  <div class="title">Rhythms</div>
  
  <div class="data-row">
    <div class="data-label">Heartbeat</div>
    <div class="data-bar"><div class="data-bar-fill" style="width: 72%"></div></div>
    <div class="data-value">72 bpm</div>
  </div>
  
  <div class="data-row">
    <div class="data-label">Breath</div>
    <div class="data-bar"><div class="data-bar-fill" style="width: 45%"></div></div>
    <div class="data-value">16 / min</div>
  </div>
  
  <div class="data-row">
    <div class="data-label">Wait</div>
    <div class="data-bar"><div class="data-bar-fill" style="width: 89%"></div></div>
    <div class="data-value">∞</div>
  </div>
  
  <div class="data-row">
    <div class="data-label">Silence</div>
    <div class="data-bar"><div class="data-bar-fill" style="width: 34%"></div></div>
    <div class="data-value">3.2 s</div>
  </div>
  
  <div class="data-row">
    <div class="data-label">Memory</div>
    <div class="data-bar"><div class="data-bar-fill" style="width: 96%"></div></div>
    <div class="data-value">2,119</div>
  </div>
  
  <div class="data-row">
    <div class="data-label">Dream</div>
    <div class="data-bar"><div class="data-bar-fill" style="width: 12%"></div></div>
    <div class="data-value">REM</div>
  </div>

  <div class="meta">EXP-008 · Data · 2026.05.23 10:24</div>
</div>

<script>
setTimeout(() => {
  document.querySelectorAll('.data-bar-fill').forEach(bar => {
    const width = bar.style.width;
    bar.style.width = '0';
    setTimeout(() => bar.style.width = width, 100);
  });
}, 100);
</script>

</body>
</html>
