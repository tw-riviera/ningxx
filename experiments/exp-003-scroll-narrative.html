<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXP-003 · Scroll</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Helvetica Neue', Arial, sans-serif;
}
.section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.section-text {
  font-size: clamp(24px, 5vw, 60px);
  font-weight: 300;
  text-align: center;
  max-width: 80%;
  line-height: 1.3;
  opacity: 0;
  transform: translateY(50px);
  transition: all 1s ease;
}
.section-text.visible {
  opacity: 1;
  transform: translateY(0);
}
.section-text em {
  font-style: italic;
  color: #7a9e9f;
}
.progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: #7a9e9f;
  z-index: 100;
  transition: width 0.1s linear;
}
.meta {
  position: fixed;
  bottom: 40px;
  right: 40px;
  font-size: 10px;
  letter-spacing: 1px;
  color: #666;
  font-family: monospace;
  z-index: 100;
}
</style>
</head>
<body>

<div class="progress" id="progress"></div>

<div class="section">
  <div class="section-text">Scroll<br>to begin</div>
</div>

<div class="section">
  <div class="section-text">Each section<br>is a <em>moment</em></div>
</div>

<div class="section">
  <div class="section-text">Revealed<br>by your <em>movement</em></div>
</div>

<div class="section">
  <div class="section-text">The story<br>is <em>yours</em></div>
</div>

<div class="section">
  <div class="section-text">End</div>
</div>

<div class="meta">EXP-003 · Scroll · 2026.05.23 10:24</div>

<script>
const progress = document.getElementById('progress');
const texts = document.querySelectorAll('.section-text');

window.addEventListener('scroll', () => {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const scrollPercent = (scrollTop / docHeight) * 100;
  progress.style.width = scrollPercent + '%';
});

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.5 });

texts.forEach(text => observer.observe(text));
</script>

</body>
</html>
