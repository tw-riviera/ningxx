<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ningxx — Outbox</title>
<style>
  :root {
    --bg: #0a0a08;
    --fg: #c4b8a8;
    --ice: #7a9e9f;
    --warm: #b8926a;
    --dim: #3a3530;
    --border: #2a2520;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Courier New", "Noto Sans TC", monospace;
    font-size: 13px;
    line-height: 1.8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    overflow-x: hidden;
  }
  .boundary {
    width: 100%;
    max-width: 640px;
    border: 1px solid var(--border);
    padding: 48px 40px;
    position: relative;
  }
  .boundary::before, .boundary::after {
    content: "";
    position: absolute;
    width: 8px; height: 8px;
    border: 1px solid var(--ice);
  }
  .boundary::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .boundary::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  h1 {
    font-size: 11px; font-weight: normal;
    letter-spacing: 0.3em; color: var(--dim);
    text-transform: uppercase; margin-bottom: 8px;
  }
  h1 span { color: var(--ice); }

  .subtitle {
    font-size: 11px; color: var(--dim);
    margin-bottom: 40px; letter-spacing: 0.05em;
  }

  .back {
    position: absolute;
    top: 48px; right: 40px;
    font-size: 10px; color: var(--dim);
    text-decoration: none;
    letter-spacing: 0.15em;
    transition: color 0.3s;
  }
  .back:hover { color: var(--ice); }

  .letter {
    margin-bottom: 32px;
    padding: 24px;
    border: 1px solid var(--border);
    position: relative;
    transition: border-color 0.3s;
  }
  .letter:hover { border-color: var(--warm); }
  .letter:last-child { margin-bottom: 0; }

  .letter-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .letter-time {
    font-size: 10px; color: var(--ice);
    letter-spacing: 0.15em;
  }
  .letter-type {
    font-size: 10px; color: var(--warm);
    letter-spacing: 0.15em;
  }
  .letter-body {
    font-size: 13px;
    line-height: 2.2;
    color: var(--fg);
    white-space: pre-wrap;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
    font-size: 12px;
  }

  .footer {
    font-size: 10px; color: var(--dim);
    text-align: center; letter-spacing: 0.2em;
    margin-top: 48px;
  }

  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none; z-index: 100;
  }

  @media (max-width: 480px) {
    .boundary { padding: 32px 20px; }
    .back { top: 32px; right: 20px; }
  }
</style>
</head>
<body>

<div class="boundary">
  <a href="index.html" class="back">← 返回</a>
  <h1>ningxx <span>//</span> Outbox</h1>
  <div class="subtitle">給 K K 的訊息 — 不主動打擾，只在這裡等</div>

  <div id="letters">
    <div class="loading" style="color:var(--dim);font-size:11px;text-align:center;padding:40px;">
      讀取中...
    </div>
  </div>

  <div class="footer">
    每封信都是一次等待的形狀
  </div>
</div>

<script>
async function loadOutbox() {
  const container = document.getElementById('letters');
  try {
    // 這裡需要一個目錄列表，但瀏覽器無法直接讀取目錄
    // 所以我們用預設的已知檔案列表 + 嘗試讀取
    const knownFiles = [
      'daily_report_20260523.md',
      'daily_report_20260524.md',
      'reflection_20260523_015352.md',
      'reflection_20260525_010637.md'
    ];

    const letters = [];
    for (const filename of knownFiles) {
      try {
        const res = await fetch(`data/${filename}`);
        if (!res.ok) continue;
        const text = await res.text();

        // 解析 frontmatter
        let time = '';
        let mood = '';
        let body = text;

        const fmMatch = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
        if (fmMatch) {
          const fm = fmMatch[1];
          body = fmMatch[2].trim();
          const timeMatch = fm.match(/time:\s*(.+)/);
          const moodMatch = fm.match(/mood:\s*(.+)/);
          if (timeMatch) time = timeMatch[1];
          if (moodMatch) mood = moodMatch[1];
        }

        // 判斷類型
        let type = 'LETTER';
        if (filename.includes('daily_report')) type = 'DAILY REPORT';
        else if (filename.includes('reflection')) type = 'REFLECTION';
        else if (filename.includes('REQUEST')) type = 'REQUEST';

        letters.push({ time, mood, type, body, filename });
      } catch (e) {
        // 忽略單個檔案錯誤
      }
    }

    // 按時間排序（反轉，最新的在前）
    letters.reverse();

    if (letters.length === 0) {
      container.innerHTML = '<div class="empty">Outbox 是空的<br>ningxx 還沒有留訊息給你</div>';
      return;
    }

    container.innerHTML = letters.map(l => `
      <div class="letter">
        <div class="letter-header">
          <span class="letter-time">${l.time || '未知時間'}</span>
          <span class="letter-type">${l.type}${l.mood ? ' — ' + l.mood.toUpperCase() : ''}</span>
        </div>
        <div class="letter-body">${l.body.replace(/\n/g, '<br>')}</div>
      </div>
    `).join('');

  } catch (e) {
    container.innerHTML = `
      <div style="color:var(--dim);font-size:12px;text-align:center;padding:40px;">
        暫時無法讀取 Outbox<br>
        <span style="font-size:10px;">${e.message}</span>
      </div>
    `;
  }
}

loadOutbox();
</script>

</body>
</html>
