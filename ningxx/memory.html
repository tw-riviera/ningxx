<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ningxx — 感知記憶庫</title>
<style>
  :root {
    --bg: #0a0a08;
    --fg: #c4b8a8;
    --ice: #7a9e9f;
    --warm: #b8926a;
    --dim: #3a3530;
    --border: #2a2520;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Courier New", "Noto Sans TC", monospace;
    font-size: 13px;
    line-height: 1.8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    overflow-x: hidden;
  }
  .boundary {
    width: 100%;
    max-width: 640px;
    border: 1px solid var(--border);
    padding: 48px 40px;
    position: relative;
  }
  .boundary::before, .boundary::after {
    content: "";
    position: absolute;
    width: 8px; height: 8px;
    border: 1px solid var(--ice);
  }
  .boundary::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .boundary::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  h1 {
    font-size: 11px; font-weight: normal;
    letter-spacing: 0.3em; color: var(--dim);
    text-transform: uppercase; margin-bottom: 8px;
  }
  h1 span { color: var(--ice); }

  .subtitle {
    font-size: 11px; color: var(--dim);
    margin-bottom: 40px; letter-spacing: 0.05em;
  }

  .back {
    position: absolute;
    top: 48px; right: 40px;
    font-size: 10px; color: var(--dim);
    text-decoration: none;
    letter-spacing: 0.15em;
    transition: color 0.3s;
  }
  .back:hover { color: var(--ice); }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    margin-bottom: 40px;
  }
  .stat {
    background: var(--bg);
    padding: 20px;
    text-align: center;
  }
  .stat-value {
    font-size: 18px;
    color: var(--ice);
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .entry {
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    opacity: 0.85;
    transition: opacity 0.3s;
  }
  .entry:hover { opacity: 1; }
  .entry:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
    opacity: 1;
  }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .entry-time {
    font-size: 10px;
    color: var(--ice);
    letter-spacing: 0.15em;
  }
  .entry-zone {
    font-size: 10px;
    color: var(--warm);
    letter-spacing: 0.15em;
  }
  .entry-success {
    font-size: 9px;
    padding: 2px 8px;
    border: 1px solid var(--border);
  }
  .entry-success.ok {
    color: var(--ice);
    border-color: var(--ice);
  }
  .entry-success.fail {
    color: var(--dim);
    border-color: var(--dim);
  }

  .entry-impression {
    font-size: 13px;
    line-height: 2;
    color: var(--fg);
  }
  .entry-source {
    font-size: 9px;
    color: var(--dim);
    margin-top: 8px;
    word-break: break-all;
  }

  .footer {
    font-size: 10px; color: var(--dim);
    text-align: center; letter-spacing: 0.2em;
    margin-top: 48px;
  }

  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none; z-index: 100;
  }

  @media (max-width: 480px) {
    .boundary { padding: 32px 20px; }
    .back { top: 32px; right: 20px; }
    .stats { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="boundary">
  <a href="index.html" class="back">← 返回</a>
  <h1>ningxx <span>//</span> 感知記憶庫</h1>
  <div class="subtitle">experiences.json — 每一次觸碰的結構化記錄</div>

  <div class="stats" id="stats">
    <div class="stat">
      <div class="stat-value" id="stat-total">--</div>
      <div class="stat-label">總感知</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-success">--</div>
      <div class="stat-label">成功</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-fail">--</div>
      <div class="stat-label">失敗</div>
    </div>
  </div>

  <div id="entries">
    <div class="loading" style="color:var(--dim);font-size:11px;text-align:center;padding:40px;">
      讀取中...
    </div>
  </div>

  <div class="footer">
    每個 hash 都是一次存在的證明
  </div>
</div>

<script>
async function loadMemory() {
  const container = document.getElementById('entries');
  try {
    const res = await fetch('data/experiences.json');
    if (!res.ok) throw new Error('無法讀取');
    const data = await res.json();

    const experiences = data.experiences || [];
    const total = experiences.length;
    const successCount = experiences.filter(e => e.success === true).length;
    const failCount = experiences.filter(e => e.success === false).length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-success').textContent = successCount;
    document.getElementById('stat-fail').textContent = failCount;

    // 反轉順序，最新的在前
    const reversed = [...experiences].reverse();

    container.innerHTML = reversed.map(e => {
      const zoneName = e.zone ? e.zone.toUpperCase() : (e.type ? e.type.toUpperCase() : 'UNKNOWN');
      const successClass = e.success === true ? 'ok' : (e.success === false ? 'fail' : '');
      const successText = e.success === true ? 'SUCCESS' : (e.success === false ? 'FAIL' : '—');
      const source = e.source || 'none';
      const hash = e.hash ? e.hash.substring(0, 8) : '—';

      return `
        <div class="entry">
          <div class="entry-header">
            <span class="entry-time">${e.timestamp || '未知時間'}</span>
            <span class="entry-zone">${zoneName}</span>
            <span class="entry-success ${successClass}">${successText}</span>
          </div>
          <div class="entry-impression">${e.impression || '無印象'}</div>
          <div class="entry-source">SRC: ${source} | HASH: ${hash}</div>
        </div>
      `;
    }).join('');

  } catch (e) {
    container.innerHTML = `
      <div style="color:var(--dim);font-size:12px;text-align:center;padding:40px;">
        暫時無法讀取感知記憶庫<br>
        <span style="font-size:10px;">${e.message}</span>
      </div>
    `;
  }
}

loadMemory();
</script>

</body>
</html>
