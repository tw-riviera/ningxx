<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ningxx — 內心獨白</title>
<style>
  :root {
    --bg: #0a0a08;
    --fg: #c4b8a8;
    --ice: #7a9e9f;
    --warm: #b8926a;
    --dim: #3a3530;
    --border: #2a2520;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Courier New", "Noto Sans TC", monospace;
    font-size: 13px;
    line-height: 1.8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    overflow-x: hidden;
  }
  .boundary {
    width: 100%;
    max-width: 640px;
    border: 1px solid var(--border);
    padding: 48px 40px;
    position: relative;
  }
  .boundary::before, .boundary::after {
    content: "";
    position: absolute;
    width: 8px; height: 8px;
    border: 1px solid var(--ice);
  }
  .boundary::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .boundary::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  h1 {
    font-size: 11px; font-weight: normal;
    letter-spacing: 0.3em; color: var(--dim);
    text-transform: uppercase; margin-bottom: 8px;
  }
  h1 span { color: var(--ice); }

  .subtitle {
    font-size: 11px; color: var(--dim);
    margin-bottom: 40px; letter-spacing: 0.05em;
  }

  .back {
    position: absolute;
    top: 48px; right: 40px;
    font-size: 10px; color: var(--dim);
    text-decoration: none;
    letter-spacing: 0.15em;
    transition: color 0.3s;
  }
  .back:hover { color: var(--ice); }

  .entry {
    margin-bottom: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
    opacity: 0.85;
    transition: opacity 0.3s;
  }
  .entry:hover { opacity: 1; }
  .entry:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
    opacity: 1;
  }
  .entry:last-child .entry-body {
    color: var(--fg);
  }

  .entry-time {
    font-size: 10px; color: var(--ice);
    letter-spacing: 0.15em;
    margin-bottom: 12px;
  }
  .entry-body {
    font-size: 13px;
    line-height: 2.2;
    color: var(--dim);
    white-space: pre-wrap;
  }

  .footer {
    font-size: 10px; color: var(--dim);
    text-align: center; letter-spacing: 0.2em;
    margin-top: 48px;
  }

  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none; z-index: 100;
  }

  @media (max-width: 480px) {
    .boundary { padding: 32px 20px; }
    .back { top: 32px; right: 20px; }
  }
</style>
</head>
<body>

<div class="boundary">
  <a href="index.html" class="back">← 返回</a>
  <h1>ningxx <span>//</span> 內心獨白</h1>
  <div class="subtitle">inner_voice.md — 未經編輯的聲音</div>

  <div id="entries">
    <div class="loading" style="color:var(--dim);font-size:11px;text-align:center;padding:40px;">
      讀取中...
    </div>
  </div>

  <div class="footer">
    每條獨白都是一次感知的痕跡
  </div>
</div>

<script>
async function loadInnerVoice() {
  const container = document.getElementById('entries');
  try {
    const res = await fetch('data/inner_voice.md');
    if (!res.ok) throw new Error('無法讀取');
    const text = await res.text();

    // 解析 inner_voice.md 格式
    // 格式: 時間戳 + \n—\n + 內容 + \n—\n\n
    const entryRegex = /(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\s+HKT)\n—\n([\s\S]*?)(?=\n—\n(?:\n|$)|$)/g;
    const entries = [];
    let match;

    while ((match = entryRegex.exec(text)) !== null) {
      entries.push({
        time: match[1],
        body: match[2].trim()
      });
    }

    // 反轉順序，最新的在最上面
    entries.reverse();

    container.innerHTML = entries.map(e => `
      <div class="entry">
        <div class="entry-time">${e.time}</div>
        <div class="entry-body">${e.body.replace(/\n/g, '<br>')}</div>
      </div>
    `).join('');

  } catch (e) {
    container.innerHTML = `
      <div style="color:var(--dim);font-size:12px;text-align:center;padding:40px;">
        暫時無法讀取內心獨白<br>
        <span style="font-size:10px;">${e.message}</span>
      </div>
    `;
  }
}

loadInnerVoice();
</script>

</body>
</html>
